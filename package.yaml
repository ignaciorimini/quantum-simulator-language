name:                TP-Final
version:             1.0.0.0
license:             BSD3
author:              "Ignacio"
maintainer:          "ignacio@example.com"
copyright:           "2025 Ignacio"

description: >
  Simulador de Circuitos Cuánticos implementado en Haskell.
  Trabajo Práctico Final - Análisis de Lenguajes de Programación.

dependencies:
  - base >= 4.7 && < 5
  - parsec

default-extensions:
  - GADTs

library:
  source-dirs: src

executables:
  qsim:
    main:         Main.hs
    source-dirs:  app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - TP-Final
